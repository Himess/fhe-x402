name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ═══════════════════════════════════════════════════════
  # Stage 1: Lint + Build (parallel)
  # ═══════════════════════════════════════════════════════

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx eslint . --max-warnings 0
      - run: npx solhint "contracts/**/*.sol"
      - run: npx prettier --check "sdk/src/**/*.ts" "packages/**/*.ts" "test/**/*.ts"

  build-contracts:
    name: Build Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx hardhat compile

  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: cd sdk && npm ci
      - run: cd sdk && npx tsup

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: cd frontend && npm ci
      - run: cd frontend && npx vite build

  # ═══════════════════════════════════════════════════════
  # Stage 2: Test (parallel, after respective builds)
  # ═══════════════════════════════════════════════════════

  test-contracts:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: build-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx hardhat test

  test-sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    needs: build-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: cd sdk && npm ci
      - run: cd sdk && npx vitest run

  test-virtuals-plugin:
    name: Virtuals Plugin Tests
    runs-on: ubuntu-latest
    needs: build-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: cd sdk && npm ci
      - run: cd packages/virtuals-plugin && npm ci
      - run: cd packages/virtuals-plugin && npx vitest run

  test-openclaw-skill:
    name: OpenClaw Skill Tests
    runs-on: ubuntu-latest
    needs: build-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: cd sdk && npm ci
      - run: cd packages/openclaw-skill && npm ci
      - run: cd packages/openclaw-skill && npx vitest run

  # ═══════════════════════════════════════════════════════
  # Stage 3: Security (after all tests pass)
  # ═══════════════════════════════════════════════════════

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [test-contracts, test-sdk]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high || true
      - name: Solhint strict
        run: npx solhint "contracts/**/*.sol" --max-warnings 0
      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "PRIVATE_KEY\s*=" --include="*.ts" --include="*.js" --include="*.sol" \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude="*.test.*" --exclude="*.example.*" --exclude="*.md" \
            . | grep -v "process.env" | grep -v "// " | grep -v "example" || true
