<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FHE x402 — Confidential Payments for the AI Economy</title>
    <meta name="description" content="AI agents pay for APIs with FHE-encrypted amounts on Ethereum. Built on Zama fhEVM + x402 HTTP payment standard." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', system-ui, sans-serif; background: #0A0A0B; color: #e0e0e0; -webkit-font-smoothing: antialiased; }
      button { transition: all 0.2s ease; }
      button:hover { opacity: 0.88; }
      button:active { transform: scale(0.97); }
      button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
      input:focus { border-color: #2DD4BF !important; box-shadow: 0 0 0 1px rgba(45,212,191,0.3); }
      a:hover { opacity: 0.85; }
      ::selection { background: rgba(45,212,191,0.25); }
      @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes pulseGlow { 0%,100%{box-shadow:0 0 8px rgba(45,212,191,0.2)} 50%{box-shadow:0 0 20px rgba(45,212,191,0.4)} }
      .fade-in { animation: fadeIn 0.3s ease-out; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #141414; }
      ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
